<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Titulo de la pagina</title>
</head>
<body>
<h1>Hola Mundo</h1>
{{name}}
{{age}}
{{message}}

{% for item in example_list %}
    {{ item }}<br>
{% endfor %}

{% if request.user.is_authenticated %}
    <p>Usuario: {{ request.user.username }}</p>
    <a href="{% url 'logout' %}">Cerrar sesion</a>
{% else %}
    <a href="{% url 'login' %}">Iniciar sesion</a>
{% endif %}
</body>
</html>
